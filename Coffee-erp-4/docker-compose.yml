version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: coffee_erp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: coffee_erp
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_secure_pass_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - erp_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_user -d coffee_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coffee_erp_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://erp_user:erp_secure_pass_2024@db:5432/coffee_erp
      SECRET_KEY: super-secret-jwt-key-change-in-production-2024
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - erp_net
    volumes:
      - ./backend/app:/app/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coffee_erp_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - erp_net

  nginx:
    image: nginx:alpine
    container_name: coffee_erp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
    networks:
      - erp_net

volumes:
  postgres_data:

networks:
  erp_net:
    driver: bridge
